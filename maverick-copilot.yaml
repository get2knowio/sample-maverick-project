# Maverick configuration for GitHub Copilot ACP provider.
# Use with: maverick -c maverick-copilot.yaml <command>
#
# Requires: GitHub Copilot CLI installed and authenticated.
# The 'copilot' provider is built-in — no command needed.

project_type: python
github:
  owner: get2knowio
  repo: sample-maverick-project
  default_branch: main

agent_providers:
  copilot:
    default: true

validation:
  sync_cmd:
  - uv
  - sync
  format_cmd:
  - ruff
  - format
  - .
  lint_cmd:
  - ruff
  - check
  - --fix
  - .
  typecheck_cmd:
  - mypy
  - .
  test_cmd:
  - pytest
  - -x
  - --tb=short
  timeout_seconds: 300
  max_errors: 50

model:
  max_tokens: 64000
  temperature: 0.0

notifications:
  enabled: false

parallel:
  max_agents: 3
  max_tasks: 5

verbosity: warning
